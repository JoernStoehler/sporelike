# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

title = "sporelike gitleaks config"

# Extend the built-in default ruleset rather than replacing it
[extend]
  useDefault = true

# Custom rules for keys not covered by defaults
[[rules]]
  id = "fal-ai-key"
  description = "fal.ai API key"
  regex = '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}:[0-9a-f]{32}'''
  tags = ["key", "fal"]

[[rules]]
  id = "google-gemini-api-key"
  description = "Google Gemini API key"
  regex = '''AIzaSy[A-Za-z0-9_-]{33}'''
  tags = ["key", "google", "gemini"]

[allowlist]
  description = "Global allowlist"
  # Ignore the config file itself and example env templates
  paths = [
    '''\.gitleaks\.toml''',
    '''\.env\.example''',
    '''\.env\.sample''',
  ]
